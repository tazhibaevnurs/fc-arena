{% extends 'base.html' %}
{% load i18n %}
{% block title %}Выход — FC Arena{% endblock %}
{% block content %}
<div class="container auth-form-wrap" style="max-width: 420px; margin: 3rem auto;">
    <div class="card card-single">
        <h2>Выход</h2>
        <p style="color: var(--text-secondary); margin-bottom: 1rem;">Вы уверены, что хотите выйти?</p>
        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            {% if redirect_field_value %}
            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
            {% endif %}
            <button type="submit" class="btn btn-primary">Выйти</button>
        </form>
    </div>
</div>
{% endblock %}
