{% extends 'base.html' %}
{% load i18n %}
{% block title %}Пароль изменён — FC Arena{% endblock %}
{% block content %}
<div class="container auth-form-wrap" style="max-width: 420px; margin: 3rem auto;">
    <div class="card card-single">
        <h2>Пароль изменён</h2>
        <p style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 1rem;">
            Ваш пароль успешно изменён. Теперь вы можете войти с новым паролем.
        </p>
        <p style="margin-top: 1rem;">
            <a href="{% url 'account_login' %}" class="btn btn-primary">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
