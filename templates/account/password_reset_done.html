{% extends 'base.html' %}
{% load i18n %}
{% block title %}Письмо отправлено — FC Arena{% endblock %}
{% block content %}
<div class="container auth-form-wrap" style="max-width: 420px; margin: 3rem auto;">
    <div class="card card-single">
        <h2>Письмо отправлено</h2>
        <p style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 1rem;">
            Если аккаунт с таким email есть, мы отправили ссылку для сброса пароля. Проверьте почту и папку «Спам».
        </p>
        <p style="margin-top: 1rem;">
            <a href="{% url 'account_login' %}" class="btn btn-primary">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
