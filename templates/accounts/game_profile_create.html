{% extends 'base.html' %}
{% block title %}Новый профиль — FC Arena{% endblock %}
{% block content %}
<div class="container" style="max-width: 560px; margin: 2rem auto;">
    <div class="card card-single">
        <h2>Новый игровой профиль</h2>
        <form method="post" style="margin-top: 1rem;">
            {% csrf_token %}
            <div class="form-group">
                <label for="nickname">Никнейм</label>
                <input type="text" name="nickname" id="nickname" required maxlength="64" placeholder="Введите никнейм" style="width: 100%; padding: 8px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary);">
            </div>
            <button type="submit" class="btn btn-primary">Создать</button>
        </form>
        <p style="margin-top: 1rem;"><a href="{% url 'game_profiles_list' %}">← К списку профилей</a></p>
    </div>
</div>
{% endblock %}
